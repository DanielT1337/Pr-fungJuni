<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Meine Lern-App</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --danger-color: #f44336;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        /* Upload Screen */
        #upload-screen {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-top: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
            padding: 15px 10px;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            font-size: 1rem;
            background-color: #fafafa;
        }
        
        #error-msg {
            color: var(--danger-color);
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        /* Quiz Screen */
        #quiz-screen {
            display: none;
            width: 100%;
            max-width: 600px;
            flex-direction: column;
            align-items: center;
        }

        #stats {
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #7f8c8d;
        }

        /* Flashcard Animation (iOS Optimiert) */
        .card-container {
            width: 100%;
            perspective: 1000px;
            margin-bottom: 20px;
            min-height: 350px;
            /* Verhindert Markieren von Text auf dem Handy beim antippen */
            -webkit-user-select: none;
            user-select: none; 
        }

        .card {
            width: 100%;
            height: 100%;
            min-height: 350px;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            font-size: 1.2rem;
            line-height: 1.5;
            overflow-y: auto;
        }

        .card-front {
            border-top: 6px solid #3498db;
        }

        .card-back {
            transform: rotateY(180deg);
            border-top: 6px solid #e67e22;
        }

        .card-label {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Buttons für Touch optimiert */
        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }

        button {
            padding: 16px 20px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            /* Verhindert den blauen Touch-Rahmen auf iOS */
            -webkit-tap-highlight-color: transparent; 
        }

        button:active {
            transform: scale(0.96);
        }

        #btn-show {
            background-color: #3498db;
            width: 100%;
        }

        #btn-correct {
            background-color: var(--primary-color);
            flex: 1;
            display: none;
        }

        #btn-incorrect {
            background-color: var(--danger-color);
            flex: 1;
            display: none;
        }

        /* Success Screen */
        #success-screen {
            display: none;
            text-align: center;
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 50px;
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>

    <div id="upload-screen">
        <h1>Lernkarten Import</h1>
        <p>Lade hier deine erstellte Datei hoch.</p>
        <input type="file" id="csvFileInput" accept=".csv, .tsv, .txt">
        <div id="error-msg"></div>
    </div>

    <div id="quiz-screen">
        <div id="stats">Karten im Stapel: <span id="cards-left">0</span></div>
        
        <div class="card-container" onclick="flipCard()">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <div class="card-label">Frage</div>
                    <div id="question-text">Lädt...</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-label">Antwort</div>
                    <div id="answer-text">Lädt...</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-show" onclick="flipCard()">Antwort anzeigen</button>
            <button id="btn-incorrect" onclick="markIncorrect()">Falsch <br><small>(Zurück in Stapel)</small></button>
            <button id="btn-correct" onclick="markCorrect()">Richtig <br><small>(Abhaken)</small></button>
        </div>
    </div>

    <div id="success-screen">
        <h1>Glückwunsch! 🎉</h1>
        <p>Du hast alle Karten in diesem Durchgang richtig beantwortet!</p>
        <button style="background-color: #3498db; margin-top: 20px; width: 100%;"
