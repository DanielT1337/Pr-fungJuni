Ich habe dir eine komplette, eigenständige Web-App in einer einzigen HTML-Datei programmiert. Sie liest deine CSV-Datei ein, mischt die Karten zufällig, hat eine schöne Umdreh-Animation für die Karteikarte und sortiert gewusste Fragen aus, während falsche Fragen wieder in den Stapel gemischt werden.

### So nutzt du die App:
1. Kopiere den kompletten Code aus der Box unten.
2. Öffne einen einfachen Texteditor (z. B. den "Editor" oder "Notepad" unter Windows, "TextEdit" beim Mac).
3. Füge den Code dort ein.
4. Klicke auf **"Speichern unter..."**, wähle als Dateityp "Alle Dateien" und nenne die Datei **`lernapp.html`** (wichtig ist die Endung `.html`). 
5. Achte darauf, dass als Codierung **UTF-8** ausgewählt ist, damit die Umlaute (ä, ö, ü) richtig angezeigt werden.
6. Ein Doppelklick auf die Datei öffnet deine neue App direkt in deinem normalen Internetbrowser!

<body>

    <!-- Startbildschirm: Datei Upload -->
    <div id="upload-screen">
        <h1>Lernkarten Import</h1>
        <p>Lade hier deine erstellte CSV-Datei hoch. <br><small>(Format: "Frage";"Antwort")</small></p>
        <input type="file" id="csvFileInput" accept=".csv">
    </div>

    <!-- Lernbildschirm: Karteikarten -->
    <div id="quiz-screen" style="display: none;">
        <div id="stats">Karten im Stapel: <span id="cards-left">0</span></div>
        
        <div class="card-container" onclick="flipCard()">
            <div class="card" id="flashcard">
                <!-- Vorderseite (Frage) -->
                <div class="card-face card-front">
                    <div class="card-label">Frage</div>
                    <div id="question-text">Lädt...</div>
                </div>
                <!-- Rückseite (Antwort) -->
                <div class="card-face card-back">
                    <div class="card-label">Antwort</div>
                    <div id="answer-text">Lädt...</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-show" onclick="flipCard()">Antwort anzeigen</button>
            <button id="btn-incorrect" onclick="markIncorrect()">Falsch (Zurück in Stapel)</button>
            <button id="btn-correct" onclick="markCorrect()">Richtig (Aus dem Stapel)</button>
        </div>
    </div>

    <!-- Erfolgsbildschirm -->
    <div id="success-screen">
        <h1>Glückwunsch! 🎉</h1>
        <p>Du hast alle Karten in diesem Durchgang richtig beantwortet!</p>
        <button style="background-color: #3498db; margin-top: 20px;" onclick="location.reload()">Neuen Durchgang starten</button>
    </div>

    <script>
        let cards = [];
        let currentIndex = -1;

        // Event Listener für den Datei-Upload
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                parseCSV(content);
            };
            // Als UTF-8 einlesen, damit Umlaute korrekt bleiben
            reader.readAsText(file, 'UTF-8');
        });

        // CSV Parser
        function parseCSV(text) {
            cards = [];
            const lines = text.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                
                // Überspringe leere Zeilen und die Kopfzeile
                if (!line || line.toLowerCase().includes('"frage";"antwort"')) continue;

                // Trennen an ";"
                let parts = line.split('";"');
                if (parts.length >= 2) {
                    // Entferne führende und abschliessende Anführungszeichen
                    let question = parts[0].replace(/^"/, '').replace(/"$/, '').trim();
                    let answer = parts[1].replace(/^"/, '').replace(/"$/, '').trim();
                    
                    if(question && answer) {
                        cards.push({ q: question, a: answer });
                    }
                }
            }

            if (cards.length > 0) {
                // UI umschalten
                document.getElementById('upload-screen').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'flex';
                
                shuffleArray(cards);
                nextCard();
            } else {
                alert('Es konnten keine gültigen Karten gefunden werden. Bitte überprüfe die CSV-Datei.');
            }
        }

        // Zeigt die nächste zufällige Karte an
        function nextCard() {
            if (cards.length === 0) {
                // Alle gewusst!
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
                return;
            }

            // Zufällige Karte aus dem restlichen Stapel auswählen
            currentIndex = Math.floor(Math.random() * cards.length);
            const card = cards[currentIndex];

            // Texte setzen
            document.getElementById('question-text').innerText = card.q;
            document.getElementById('answer-text').innerText = card.a;
            
            // UI aktualisieren (Karte auf Vorderseite drehen, Buttons anpassen)
            document.getElementById('flashcard').classList.remove('is-flipped');
            document.getElementById('btn-show').style.display = 'block';
            document.getElementById('btn-correct').style.display = 'none';
            document.getElementById('btn-incorrect').style.display = 'none';
            
            updateStats();
        }

        // Karte umdrehen
        function flipCard() {
            const cardElement = document.getElementById('flashcard');
            // Verhindern, dass erneut umgedreht wird, wenn schon die Antwort sichtbar ist
            if (cardElement.classList.contains('is-flipped')) return;

            cardElement.classList.add('is-flipped');
            
            // Buttons umschalten
            document.getElementById('btn-show').style.display = 'none';
            document.getElementById('btn-correct').style.display = 'block';
            document.getElementById('btn-incorrect').style.display = 'block';
        }

        // Antwort war richtig -> Karte aus dem Stapel löschen
        function markCorrect() {
            cards.splice(currentIndex, 1);
            nextCard();
        }

        // Antwort war falsch -> Karte bleibt im Stapel
        function markIncorrect() {
            // Einfach nächste Karte ziehen, die aktuelle bleibt im Array (cards)
            nextCard();
        }

        // Statistik Anzeige aktualisieren
        function updateStats() {
            document.getElementById('cards-left').innerText = cards.length;
        }

        // Hilfsfunktion zum Mischen beim Start
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
    </script>
</body>
